<!DOCTYPE html>
<html dir="rtl" land="he">
<head>
  <title>Gym Reservations</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>שריין לך ערסל</h2>
<p class="desc">
  בחר יום ושעה לשריין לך ערסל<br>
  הזן את שמך המלא, וסיסמא כרצונך<br>
  בעת רצון לביטול יש להקיש על האיקס האדום ולהזין את הסיסמא
</p>

<input type="date" id="datePicker">

<div id="grid"></div>

<button id="save" disabled>שריין</button>

<div id="modal" class="hidden">
  <input id="name" placeholder="שם מלא">
  <input id="password" placeholder="סיסמא">
  <button id="confirm">אשר</button>
  <button id="close">סגור</button>
</div>

<script src="app.js"></script>
</body>
</html>
